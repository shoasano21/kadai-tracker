<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アイコン生成ツール</title>
<style>
  body { font-family: -apple-system, "Hiragino Sans", sans-serif; padding: 30px; background: #f6f7fb; color: #1b1f2e; max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p { color: #5c6479; font-size: 14px; line-height: 1.6; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 20px; }
  .card { background: #fff; border: 1px solid #e3e6ef; border-radius: 12px; padding: 14px; text-align: center; }
  canvas { max-width: 100%; height: auto; border-radius: 12px; background: #fafbfe; border: 1px solid #e3e6ef; }
  .name { font-size: 13px; font-weight: 600; margin: 8px 0 6px; }
  button { background: linear-gradient(135deg,#667eea,#764ba2); color:#fff; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
  button:hover { opacity: 0.92; }
  .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
  .big-btn { padding: 12px 18px; font-size: 14px; }
  .info { background: #fff3cd; border: 1px solid #ffd966; color: #7a5a00; padding: 10px 14px; border-radius: 10px; margin-top: 16px; font-size: 13px; }
  code { background: #eef1f8; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<h1>🎨 PWA アイコン生成</h1>
<p>このページを開いた時点で下に各サイズのアイコンがレンダリングされます。<strong>「全て保存」</strong>ボタンで4ファイルを一括ダウンロードし、<code>icons/</code> フォルダへ配置してください。</p>

<div class="actions">
  <button class="big-btn" id="saveAll">💾 全て保存</button>
</div>

<div class="info">
  💡 ブラウザが複数ダウンロードをブロックした場合は、各カードの「保存」ボタンから個別にダウンロードしてください。
</div>

<div class="grid" id="grid"></div>

<script>
const ICON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26d67a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="112" y="140" width="288" height="232" rx="18" fill="#ffffff"/>
  <g stroke="#764ba2" stroke-width="12" fill="none" stroke-linecap="round">
    <line x1="160" y1="200" x2="340" y2="200"/>
    <line x1="160" y1="240" x2="300" y2="240"/>
    <line x1="160" y1="280" x2="320" y2="280"/>
  </g>
  <circle cx="380" cy="348" r="62" fill="url(#check)" stroke="#ffffff" stroke-width="10"/>
  <path d="M352 348 l20 20 l36 -40" stroke="#ffffff" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

// Maskable: full-bleed gradient with centered artwork (Android mask-safe zone = inner 80%)
const MASKABLE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26d67a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g transform="translate(60,60) scale(0.765)">
    <rect x="112" y="140" width="288" height="232" rx="18" fill="#ffffff"/>
    <g stroke="#764ba2" stroke-width="12" fill="none" stroke-linecap="round">
      <line x1="160" y1="200" x2="340" y2="200"/>
      <line x1="160" y1="240" x2="300" y2="240"/>
      <line x1="160" y1="280" x2="320" y2="280"/>
    </g>
    <circle cx="380" cy="348" r="62" fill="url(#check)" stroke="#ffffff" stroke-width="10"/>
    <path d="M352 348 l20 20 l36 -40" stroke="#ffffff" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>`;

const TARGETS = [
  { name: 'icon-192.png', size: 192, svg: ICON_SVG },
  { name: 'icon-512.png', size: 512, svg: ICON_SVG },
  { name: 'icon-maskable-512.png', size: 512, svg: MASKABLE_SVG },
  { name: 'apple-touch-icon.png', size: 180, svg: ICON_SVG }
];

async function renderOne(target) {
  const blob = new Blob([target.svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = await new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = rej;
    im.src = url;
  });
  const canvas = document.createElement('canvas');
  canvas.width = target.size;
  canvas.height = target.size;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, target.size, target.size);
  URL.revokeObjectURL(url);
  return canvas;
}

function download(canvas, filename) {
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}

const state = [];

(async () => {
  const grid = document.getElementById('grid');
  for (const t of TARGETS) {
    const canvas = await renderOne(t);
    state.push({ t, canvas });

    const card = document.createElement('div');
    card.className = 'card';
    const preview = canvas.cloneNode(true);
    preview.getContext('2d').drawImage(canvas, 0, 0);
    preview.style.maxWidth = '120px';
    card.appendChild(preview);
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = `${t.name} (${t.size}×${t.size})`;
    card.appendChild(name);
    const btn = document.createElement('button');
    btn.textContent = '⬇ 保存';
    btn.onclick = () => download(canvas, t.name);
    card.appendChild(btn);
    grid.appendChild(card);
  }

  document.getElementById('saveAll').onclick = async () => {
    for (const { t, canvas } of state) {
      download(canvas, t.name);
      await new Promise(r => setTimeout(r, 250));
    }
  };
})();
</script>
</body>
</html>
