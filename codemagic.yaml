workflows:
  ios-testflight:
    name: iOS TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app store credentials
      vars:
        XCODE_WORKSPACE: "課題トラッカー.xcworkspace"
        XCODE_SCHEME: "課題トラッカー"
        APP_STORE_APPLE_ID: "6762558649"
        BUNDLE_ID: "com.shoasano21.kadaitracker"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Decode API key and set up code signing
        script: |
          set -ex
          # Decode base64 API key to a file
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 -d > /tmp/auth_key.p8
          # Expose the decoded key to subsequent steps via $CM_ENV (Codemagic's env persistence)
          {
            echo "APP_STORE_CONNECT_PRIVATE_KEY<<__EOF__"
            cat /tmp/auth_key.p8
            echo "__EOF__"
          } >> "$CM_ENV"

          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --private-key @file:/tmp/auth_key.p8 \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          cd ios/src
          xcode-project use-profiles
          echo "=== Signing settings after use-profiles ==="
          grep -E "PROVISIONING_PROFILE|DEVELOPMENT_TEAM|CODE_SIGN" 課題トラッカー.xcodeproj/project.pbxproj | head -12
      - name: Install CocoaPods dependencies
        script: |
          cd ios/src
          pod install --repo-update
      - name: Set build number
        script: |
          cd ios/src
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" --private-key @file:/tmp/auth_key.p8 --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" 2>/dev/null || echo 0)
          NEW_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          agvtool new-version -all $NEW_BUILD_NUMBER
          echo "Using build number $NEW_BUILD_NUMBER"
      - name: Build ipa
        script: |
          cd ios/src
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/src/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
