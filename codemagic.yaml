workflows:
  ios-testflight:
    name: iOS TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app store credentials
      vars:
        XCODE_PROJECT: "課題トラッカー.xcodeproj"
        XCODE_SCHEME: "課題トラッカー"
        APP_STORE_APPLE_ID: "6762558649"
        BUNDLE_ID: "com.shoasano21.kadaitracker"
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Decode API key and set up code signing
        script: |
          set -ex
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 -d > /tmp/auth_key.p8
          {
            echo "APP_STORE_CONNECT_PRIVATE_KEY<<__EOF_P8__"
            cat /tmp/auth_key.p8
            echo ""
            echo "__EOF_P8__"
          } >> "$CM_ENV"

          openssl genrsa -out /tmp/cert_key.pem 2048

          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --private-key @file:/tmp/auth_key.p8 \
            --certificate-key @file:/tmp/cert_key.pem \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          cd ios/src
          xcode-project use-profiles
      - name: Set build number
        script: |
          set -e
          cd ios/src
          # Prefer the latest TestFlight build number, fall back to Codemagic's
          # auto-incrementing $BUILD_NUMBER. Either way, we add 1 so every
          # upload has a strictly greater CFBundleVersion than the last.
          LATEST_TF=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" \
            --private-key @file:/tmp/auth_key.p8 \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" 2>/dev/null || echo "")
          if [ -z "$LATEST_TF" ] || ! [[ "$LATEST_TF" =~ ^[0-9]+$ ]]; then
            LATEST_TF=0
          fi
          CM_BN=${BUILD_NUMBER:-0}
          BASELINE=$(( LATEST_TF > CM_BN ? LATEST_TF : CM_BN ))
          NEW_BUILD_NUMBER=$(( BASELINE + 1 ))
          agvtool new-version -all $NEW_BUILD_NUMBER
          echo "TestFlight latest=$LATEST_TF, Codemagic build=$CM_BN, using=$NEW_BUILD_NUMBER"
      - name: Build ipa
        script: |
          cd ios/src
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/src/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
