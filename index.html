<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>課題トラッカー</title>
<meta name="description" content="講義ごとの課題を管理するトラッカー" />
<link rel="privacy-policy" href="privacy.html" />

<meta name="theme-color" content="#667eea" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0f1120" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="課題トラッカー" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="format-detection" content="telephone=no" />

<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />

<style>
  :root {
    --bg: #f5f6fb;
    --bg-grad-1: #f5dfec;
    --bg-grad-2: #d8e3fb;
    --bg-grad-3: #dff0e4;
    --panel: rgba(255,255,255,0.82);
    --panel-solid: #ffffff;
    --panel-2: #f8f9fc;
    --text: #1d2236;
    --text-sub: #5a6480;
    --border: rgba(196,201,222,0.65);
    --border-strong: #c4c9de;
    --accent-1: #5a72e0;
    --accent-2: #8561cf;
    --accent: #5a72e0;
    --today: #e74c5c;
    --urgent-1: #e74c5c;
    --urgent-2: #eb8a4a;
    --urgent: #e74c5c;
    --soon-1: #eaa93c;
    --soon-2: #f0c14b;
    --soon: #eaa93c;
    --ok-1: #38b77e;
    --ok-2: #58cf93;
    --ok: #2ea36c;
    --done: #9aa0a6;
    --type-report-bg: linear-gradient(135deg, #ede7fa, #dcd0f7);
    --type-report-fg: #6a3dd1;
    --type-memory-bg: linear-gradient(135deg, #e1f5e7, #c7ecd1);
    --type-memory-fg: #247a3d;
    --type-problem-bg: linear-gradient(135deg, #fdecd3, #fbd79c);
    --type-problem-fg: #a8631a;
    --type-reading-bg: linear-gradient(135deg, #dce8fa, #bed4f5);
    --type-reading-fg: #1e5aaa;
    --type-lab-bg: linear-gradient(135deg, #d7f3ee, #b0e6dd);
    --type-lab-fg: #0e7268;
    --type-presentation-bg: linear-gradient(135deg, #fce4ec, #f7c0d2);
    --type-presentation-fg: #b02a5e;
    --type-quiz-bg: linear-gradient(135deg, #ffe5d4, #ffc9a8);
    --type-quiz-fg: #c54c10;
    --type-exam-bg: linear-gradient(135deg, #fde0e0, #fbc1c1);
    --type-exam-fg: #a81c1c;
    --type-group-bg: linear-gradient(135deg, #d9f1f5, #b3e3ea);
    --type-group-fg: #0f6d82;
    --type-other-bg: linear-gradient(135deg, #e6e8ef, #d4d7e2);
    --type-other-fg: #4b5167;
    --shadow: 0 4px 18px rgba(60,70,120,0.08);
    --shadow-lg: 0 20px 60px rgba(50,60,110,0.22);
    --shadow-glow: 0 0 0 4px rgba(102,126,234,0.12);
    --radius: 14px;
  }
  [data-theme="dark"] {
    --bg: #131628;
    --bg-grad-1: #2a1f46;
    --bg-grad-2: #1c2a4a;
    --bg-grad-3: #1c3536;
    --panel: rgba(32,36,55,0.82);
    --panel-solid: #1e2232;
    --panel-2: #262a3c;
    --text: #ebedf6;
    --text-sub: #9ba3be;
    --border: rgba(62,68,92,0.65);
    --border-strong: #3c4262;
    --accent-1: #8a9cf3;
    --accent-2: #b683f0;
    --accent: #8a9cf3;
    --today: #f06675;
    --urgent-1: #f06675;
    --urgent-2: #f09765;
    --urgent: #f06675;
    --soon-1: #f2b862;
    --soon-2: #f5d080;
    --soon: #f2b862;
    --ok-1: #5ec991;
    --ok-2: #82dbae;
    --ok: #4fbd85;
    --done: #6b7184;
    --type-report-bg: linear-gradient(135deg, #3d2d66, #5a3d8c);
    --type-report-fg: #d4c5ff;
    --type-memory-bg: linear-gradient(135deg, #1f4230, #2a6545);
    --type-memory-fg: #9eeab4;
    --type-problem-bg: linear-gradient(135deg, #4a3820, #6b5028);
    --type-problem-fg: #ffd89c;
    --type-reading-bg: linear-gradient(135deg, #1e3a66, #2a548c);
    --type-reading-fg: #bfd7ff;
    --type-lab-bg: linear-gradient(135deg, #173f3a, #205a52);
    --type-lab-fg: #9eebdf;
    --type-presentation-bg: linear-gradient(135deg, #4a2236, #6a3452);
    --type-presentation-fg: #ffc0d6;
    --type-quiz-bg: linear-gradient(135deg, #4a2e18, #6a4423);
    --type-quiz-fg: #ffcaa3;
    --type-exam-bg: linear-gradient(135deg, #4d1e1e, #6e2a2a);
    --type-exam-fg: #ffbaba;
    --type-group-bg: linear-gradient(135deg, #1a3d45, #255864);
    --type-group-fg: #a6e4ef;
    --type-other-bg: linear-gradient(135deg, #2d3243, #3f465d);
    --type-other-fg: #c5cae1;
    --shadow: 0 4px 18px rgba(0,0,0,0.35);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.55);
    --shadow-glow: 0 0 0 4px rgba(139,159,255,0.18);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  html { height: 100%; -webkit-text-size-adjust: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
    overscroll-behavior-y: none;
    -webkit-overflow-scrolling: touch;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }

  button, .view-toggle, .summary .card, header.topbar h1, .type-badge, .remain-badge, .toast, .cal-cell, .cal-nav {
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  @media (hover: none) and (pointer: coarse) {
    .icon-btn { width: 40px; height: 40px; font-size: 17px; }
    .btn { padding: 10px 16px; font-size: 14px; }
    .view-toggle button { padding: 10px 18px; font-size: 14px; }
  }

  @media (display-mode: standalone) {
    header.topbar { margin-top: 4px; }
  }

  body::before {
    content: "";
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(circle at 15% 20%, var(--bg-grad-1) 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, var(--bg-grad-2) 0%, transparent 50%),
      radial-gradient(circle at 50% 85%, var(--bg-grad-3) 0%, transparent 55%);
    filter: blur(60px);
    opacity: 0.7;
    z-index: -2;
    animation: meshFloat 28s ease-in-out infinite;
    pointer-events: none;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: var(--bg);
    opacity: 0.65;
    z-index: -1;
    pointer-events: none;
  }
  @keyframes meshFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(-3%, 2%) rotate(1deg); }
    66% { transform: translate(3%, -2%) rotate(-1deg); }
  }

  .app {
    max-width: 1280px;
    margin: 0 auto;
    padding: 20px 16px calc(120px + env(safe-area-inset-bottom));
    position: relative;
    z-index: 1;
  }

  /* Header */
  header.topbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 12px 18px;
    margin-bottom: 16px;
    background: var(--panel);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }
  header.topbar h1 {
    font-size: 26px;
    margin: 0;
    margin-right: auto;
    padding: 2px 0;
    letter-spacing: -0.01em;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 900;
    text-align: left;
    white-space: nowrap;
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  header.topbar h1::before {
    content: "";
    display: inline-block;
    width: 5px;
    height: 26px;
    background: linear-gradient(180deg, var(--accent-1), var(--accent-2));
    border-radius: 3px;
    -webkit-text-fill-color: initial;
  }

  .view-bar {
    margin-bottom: 14px;
  }
  .view-bar .view-toggle {
    width: 100%;
    display: flex;
  }
  .view-bar .view-toggle button {
    flex: 1;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .view-toggle {
    display: inline-flex;
    background: var(--panel);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    position: relative;
    box-shadow: var(--shadow);
  }
  .view-toggle button {
    background: transparent;
    color: var(--text-sub);
    border: none;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    border-radius: 999px;
    transition: color .2s;
    position: relative;
    z-index: 2;
  }
  .view-toggle button.active { color: #fff; }
  .view-toggle button.active::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--accent);
    border-radius: 999px;
    z-index: -1;
    box-shadow: 0 2px 8px rgba(90,114,224,0.25);
  }

  .btn {
    background: var(--panel-solid);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: transform .15s, box-shadow .15s, background .15s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn:active { transform: translateY(0); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
    border: none;
    box-shadow: 0 6px 18px rgba(102,126,234,0.35);
  }
  .btn.primary:hover { box-shadow: 0 10px 28px rgba(102,126,234,0.5); }
  .btn.notify-on {
    background: var(--ok);
    color: #fff;
    border: none;
    box-shadow: none;
  }

  /* Summary */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .summary .card {
    background: var(--panel);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 14px 18px 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
    min-height: 72px;
  }
  .summary .card:hover { transform: translateY(-3px) scale(1.01); box-shadow: var(--shadow-lg); }
  .summary .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }
  .summary .card.urgent::before { background: linear-gradient(90deg, var(--urgent-1), var(--urgent-2)); }
  .summary .card.soon::before { background: linear-gradient(90deg, var(--soon-1), var(--soon-2)); }
  .summary .card.ok::before { background: linear-gradient(90deg, var(--ok-1), var(--ok-2)); }
  .summary .card.done::before { background: linear-gradient(90deg, #c3c7d4, #9aa0a6); }
  .summary .card .emoji {
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    font-size: 20px;
    opacity: 0.85;
  }
  .summary .label {
    color: var(--text-sub);
    font-size: 12px;
    font-weight: 600;
    line-height: 1.2;
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .summary .label-emoji {
    font-size: 13px;
    line-height: 1;
    margin-left: auto;
  }
  .summary .value {
    font-size: 30px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1;
    min-width: 26px;
  }
  .summary .urgent .value { background: linear-gradient(135deg, var(--urgent-1), var(--urgent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .summary .soon .value { background: linear-gradient(135deg, var(--soon-1), var(--soon-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .summary .ok .value { background: linear-gradient(135deg, var(--ok-1), var(--ok-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .summary .done .value { color: var(--done); }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .summary .urgent.has-items .emoji { animation: pulse 1.4s ease-in-out infinite; }

  /* Reminder banner */
  .reminder {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--urgent-1), var(--urgent-2));
    color: #fff;
    padding: 10px 16px;
    border-radius: var(--radius);
    margin-bottom: 14px;
    box-shadow: 0 8px 22px rgba(255,56,96,0.3);
    font-size: 13px;
    font-weight: 600;
    animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .reminder .msg { flex: 1; }
  .reminder .close-btn {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: none;
    border-radius: 999px;
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
  }

  /* Filter bar (two columns) */
  .filter-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    background: var(--panel);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .filter-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .filter-bar label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .filter-bar select {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: border-color .15s;
    width: 100%;
  }
  .filter-bar select:focus { outline: none; border-color: var(--accent); box-shadow: var(--shadow-glow); }

  /* Gantt view */
  .gantt-wrap {
    background: var(--panel);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: auto;
    padding: 32px 10px 18px 10px;
  }
  .gantt {
    position: relative;
    min-width: 800px;
    --title-w: 180px;
    --action-w: 90px;
  }
  .gantt-header {
    position: relative;
    display: grid;
    grid-template-columns: 180px 1fr 90px;
    border-bottom: 2px solid var(--border-strong);
    padding-bottom: 10px;
    margin-bottom: 10px;
    font-size: 11px;
    color: var(--text-sub);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .gantt-header .title-col { padding-left: 6px; }
  .gantt-header .actions-col { text-align: right; padding-right: 10px; }
  .gantt-header .timeline-col { position: relative; height: 40px; }

  /* Sticky task-name column so the timeline can scroll independently while
     course/title stays visible. Actions column is NOT sticky — user has to
     scroll to the right edge to reach it. */
  .gantt-header .title-col,
  .gantt-row .task-label {
    position: sticky;
    left: 0;
    z-index: 15;
    background: var(--panel-solid);
    border-right: 1px solid var(--border);
  }
  /* Mask any content rendered to the left of the sticky label (covers the
     wrap's left padding and any horizontal bleed from scrolling bars). */
  .gantt-header .title-col::before,
  .gantt-row .task-label::before {
    content: "";
    position: absolute;
    top: 0;
    right: 100%;
    width: 20px;
    height: 100%;
    background: var(--panel-solid);
  }
  .gantt-month {
    position: absolute;
    top: 0;
    font-size: 11px;
    color: var(--text-sub);
    border-left: 2px dashed var(--border);
    padding-left: 6px;
    padding-top: 2px;
    height: 18px;
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0;
  }
  .gantt-day-tick {
    position: absolute;
    bottom: 0;
    font-size: 10px;
    color: var(--text-sub);
    font-weight: 500;
    padding-left: 3px;
    border-left: 1px solid var(--border);
    height: 18px;
    line-height: 1.4;
    text-transform: none;
    letter-spacing: 0;
    white-space: nowrap;
  }

  .gantt-row {
    display: grid;
    grid-template-columns: 180px 1fr 90px;
    align-items: center;
    min-height: 48px;
    border-bottom: 1px dashed var(--border);
    position: relative;
    transition: background .15s;
  }
  .gantt-row:hover { background: rgba(102,126,234,0.04); }
  .gantt-row .task-label {
    padding: 8px 8px 8px 6px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
  }
  .task-label .course-tag {
    font-size: 11px;
    color: var(--text-sub);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .task-label .task-title {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gantt-row.done .task-label .task-title { text-decoration: line-through; color: var(--done); }
  .gantt-row.done .bar { background: linear-gradient(135deg, #b8bdcc, #9aa0a6) !important; opacity: 0.55; }

  .timeline-col { position: relative; height: 100%; min-height: 48px; }
  .bar {
    position: absolute;
    top: 50%;
    transform: translateY(-50%) scaleX(0);
    transform-origin: left center;
    height: 22px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 11px;
    color: #fff;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    animation: barSlide 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    transition: transform .2s, box-shadow .2s;
  }
  @keyframes barSlide {
    from { transform: translateY(-50%) scaleX(0); }
    to { transform: translateY(-50%) scaleX(1); }
  }
  .bar.urgent {
    background: linear-gradient(135deg, var(--urgent-1), var(--urgent-2));
    background-size: 200% 200%;
    animation: barSlide 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, shimmerBg 3s ease-in-out infinite;
  }
  .bar.soon { background: linear-gradient(135deg, var(--soon-1), var(--soon-2)); }
  .bar.ok { background: linear-gradient(135deg, var(--ok-1), var(--ok-2)); }
  .bar.past { background: linear-gradient(135deg, #8b91a6, #9aa0a6); opacity: 0.55; }
  @keyframes shimmerBg {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--today), transparent);
    z-index: 10;
    pointer-events: none;
    box-shadow: 0 0 12px rgba(255,56,96,0.6);
  }
  .today-line::before {
    content: "📍 今日";
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--today), #ff6b4a);
    color: #fff;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
    font-weight: 700;

  .cal-cell {

  .cal-cell.today {

  .cal-cell.today .day-num {

  }
  .cal-cell.selected {

    box-shadow: 0 8px 22px rgba(102,126,234,0.45);
  }
  .cal-cell.selected .day-num,
  .cal-cell.selected .cal-chip { color: #fff !important; }
  .cal-cell.selected .day-num { background: none; -webkit-text-fill-color: #fff; }

  .cal-chips {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 3px;
    flex: 1;
    overflow: hidden;
  }
  .cal-chip {
    font-size: 9px;
    line-height: 1.2;
    padding: 1px 4px;
    border-radius: 4px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #fff;
  }
  .cal-chip.urgent { background: linear-gradient(135deg, var(--urgent-1), var(--urgent-2)); }
  .cal-chip.soon { background: linear-gradient(135deg, var(--soon-1), var(--soon-2)); }
  .cal-chip.ok { background: linear-gradient(135deg, var(--ok-1), var(--ok-2)); }
  .cal-chip.past { background: #9aa0a6; }
  .cal-chip.more {
    background: transparent;
    color: var(--text-sub);
    font-size: 10px;
    padding: 0;
    text-align: center;
  }

  .cal-detail {
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--panel-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius);

  }
  .cal-detail-header {
    font-weight: 800;
    font-size: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cal-detail-empty {
    color: var(--text-sub);
    font-size: 13px;
    padding: 12px 0;
    text-align: center;
  }
  .cal-task {

    align-items: center;
    padding: 10px 12px;
    border-radius: 10px;

    border-left: 4px solid;

  }
  .cal-task.urgent { border-color: var(--urgent); }
  .cal-task.soon { border-color: var(--soon); }
  .cal-task.ok { border-color: var(--ok); }
  .cal-task.past { border-color: #9aa0a6; opacity: 0.7; }

  .cal-task.done .cal-task-title { text-decoration: line-through; color: var(--done); }
  .cal-task-body { flex: 1; min-width: 0; }
  .cal-task-course {
    font-size: 11px;
    color: var(--text-sub);
    font-weight: 600;
  }
  .cal-task-title {
    font-size: 14px;
    font-weight: 700;
  }
  .cal-task-meta {
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 2px;

  .cal-task-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;

  /* FAB (Floating Action Button) */
  .fab {
    position: fixed;
    right: calc(20px + env(safe-area-inset-right));
    bottom: calc(24px + env(safe-area-inset-bottom));
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
    font-size: 28px;
    font-weight: 300;
    cursor: pointer;
    box-shadow: 0 12px 30px rgba(102,126,234,0.55), 0 4px 10px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 90;
    transition: transform .2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow .2s;
  }
  .fab:hover {
    transform: scale(1.08);
    box-shadow: 0 16px 40px rgba(102,126,234,0.7), 0 6px 14px rgba(0,0,0,0.12);
  }
  .fab:active { transform: scale(0.95); }
  .fab::before {
    content: "+";
    line-height: 1;
    margin-top: -3px;
  }
  .fab .fab-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--accent-1);
    opacity: 0.4;
    pointer-events: none;
    animation: fabPulse 2.4s ease-out infinite;
  }
  @keyframes fabPulse {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,18,35,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--panel-solid);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px;
    width: 90%;
    max-width: 480px;
    box-shadow: var(--shadow-lg);
    transform: scale(0.9) translateY(20px);
    transition: transform .3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    max-height: 90dvh;
    overflow-y: auto;
  }
  .modal::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal h2 {
    margin: 0 0 16px;
    font-size: 18px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 4px;
  }
  .field label .req { color: var(--urgent); margin-left: 2px; }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--panel-2);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 16px;
    font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: var(--shadow-glow);
  }
  .field textarea { resize: vertical; min-height: 60px; font-size: 14px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) {
    .field-row { grid-template-columns: 1fr; gap: 12px; }
  }
  .field input[type="date"] {
    text-align: left;
    -webkit-appearance: none;
    appearance: none;
    min-height: 44px;
    display: block;
  }
  .field input[type="date"]::-webkit-date-and-time-value {
    text-align: left;
  }
  .field-error {
    color: var(--urgent);
    font-size: 12px;
    min-height: 16px;
    margin-top: 2px;
    font-weight: 600;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }

  /* Toast */
  .toast-host {
    position: fixed;
    top: calc(20px + env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--text);
    color: var(--panel-solid);
    padding: 11px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transform: translateY(-20px) scale(0.9);
    transition: opacity .3s, transform .3s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toast.show { opacity: 1; transform: translateY(0) scale(1); }
  .toast.success { background: linear-gradient(135deg, var(--ok-1), var(--ok-2)); color: #fff; }
  .toast.warn { background: linear-gradient(135deg, var(--soon-1), var(--soon-2)); color: #fff; }
  .toast.error { background: linear-gradient(135deg, var(--urgent-1), var(--urgent-2)); color: #fff; }

  /* Type badge (for calendar detail, etc.) */
  .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
  }
  .type-badge.report { background: var(--type-report-bg); color: var(--type-report-fg); }
  .type-badge.memory { background: var(--type-memory-bg); color: var(--type-memory-fg); }
  .type-badge.problem { background: var(--type-problem-bg); color: var(--type-problem-fg); }
  .type-badge.reading { background: var(--type-reading-bg); color: var(--type-reading-fg); }
  .type-badge.lab { background: var(--type-lab-bg); color: var(--type-lab-fg); }
  .type-badge.presentation { background: var(--type-presentation-bg); color: var(--type-presentation-fg); }
  .type-badge.quiz { background: var(--type-quiz-bg); color: var(--type-quiz-fg); }
  .type-badge.exam { background: var(--type-exam-bg); color: var(--type-exam-fg); }
  .type-badge.group { background: var(--type-group-bg); color: var(--type-group-fg); }
  .type-badge.other { background: var(--type-other-bg); color: var(--type-other-fg); }

  /* Course chip suggestions in modal */
  .chip-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .chip-suggestions:empty { display: none; }
  .chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text);
    transition: all .15s;
    font-family: inherit;
  }
  .chip:hover {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));

  .chip.active {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));

  .empty {

  }
  .empty .sub {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 4px;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 500;
    will-change: transform, opacity;
  }

  @media (max-width: 700px) {
    .app { padding: 16px 12px calc(110px + env(safe-area-inset-bottom)); }
    .summary { grid-template-columns: repeat(3, 1fr); gap: 6px; }

  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <h1>課題トラッカー</h1>
    <button id="btnTheme" class="btn" title="テーマ切り替え">🌙</button>
    <button id="btnNotify" class="btn">🔔</button>
  </header>

  <div class="view-bar">
    <div class="view-toggle" role="tablist">
      <button id="btnViewGantt" class="active" data-view="gantt">📊 タイムライン</button>
      <button id="btnViewCalendar" data-view="calendar">📅 カレンダー</button>
    </div>
  </div>

  <section class="summary">
    <div class="card urgent" id="cardUrgent">
      <div class="value" id="sumUrgent">0</div>
      <div class="label">緊急<span class="label-emoji">🔥</span></div>
    </div>
    <div class="card ok">
      <div class="value" id="sumOk">0</div>
      <div class="label">余裕あり<span class="label-emoji">🌱</span></div>
    </div>
    <div class="card done">
      <div class="value" id="sumDone">0</div>
      <div class="label">済み<span class="label-emoji">🎉</span></div>
    </div>
  </section>

  <div id="reminderHost"></div>

  <section class="filter-bar">
    <div class="filter-row">
      <label for="filterCourse">🎓 講義名</label>
      <select id="filterCourse"><option value="">すべて</option></select>
    </div>
    <div class="filter-row">
      <label for="filterStatus">🔍 ステータス</label>
      <select id="filterStatus">
        <option value="open" selected>未提出のみ</option>
        <option value="all">全件</option>
        <option value="done">提出済のみ</option>
      </select>
    </div>
  </section>

  <main id="viewHost"></main>
</div>

<button id="btnFab" class="fab" title="課題を追加" aria-label="課題を追加">
  <span class="fab-ring"></span>
</button>

<div id="modalOverlay" class="modal-overlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h2 id="modalTitle">✨ 課題を追加</h2>
    <form id="addForm" novalidate>
      <div class="field">
        <label for="fCourse">🎓 講義名<span class="req">*</span></label>
        <input id="fCourse" type="text" maxlength="40" autocomplete="off" placeholder="新しい講義名を入力、または下から選択" />
        <div class="chip-suggestions" id="chipSuggestions" aria-label="既存の講義から選択"></div>
      </div>
      <div class="field">
        <label for="fTitle">📌 課題名<span class="req">*</span></label>
        <input id="fTitle" type="text" maxlength="60" />
      </div>
      <div class="field">
        <label for="fType">🏷 種別<span class="req">*</span></label>
        <select id="fType">
          <option value="report">📝 レポート</option>
          <option value="problem">✏️ 問題演習</option>
          <option value="memory">📖 暗記</option>
          <option value="reading">📚 予習・読書</option>
          <option value="lab">🔬 実習・実験</option>
          <option value="presentation">🎤 発表・プレゼン</option>
          <option value="quiz">✅ 小テスト</option>
          <option value="exam">📊 試験対策</option>
          <option value="group">👥 グループワーク</option>
          <option value="other">📎 その他</option>
        </select>
      </div>
      <div class="field">
        <label for="fDesc">💬 詳細</label>
        <textarea id="fDesc" maxlength="400" placeholder="任意"></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="fStart">🚩 出題日<span class="req">*</span></label>
          <input id="fStart" type="date" />
        </div>
        <div class="field">
          <label for="fEnd">🏁 締切日<span class="req">*</span></label>
          <input id="fEnd" type="date" />
        </div>
      </div>
      <div class="field">
        <label for="fRemindDays">🔔 通知タイミング</label>
        <select id="fRemindDays">
          <option value="0">締切当日のみ</option>
          <option value="1">前日 & 当日</option>
          <option value="3" selected>3日前・前日・当日</option>
          <option value="7">1週間前・3日前・前日・当日</option>
          <option value="-1">通知なし</option>
        </select>
      </div>
      <div class="field-error" id="formError"></div>
      <div class="modal-actions">
        <button type="button" class="btn" id="btnCancel">キャンセル</button>
        <button type="submit" class="btn primary">💾 保存</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-host" id="toastHost"></div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'kadai_tracker_v2';
  const DAY_MS = 86400000;

  const TYPE_EMOJI = {
    report: '📝', problem: '✏️', memory: '📖', reading: '📚',
    lab: '🔬', presentation: '🎤', quiz: '✅', exam: '📊',
    group: '👥', other: '📎'
  };
  const TYPE_LABEL = {
    report: 'レポート', problem: '問題演習', memory: '暗記', reading: '予習・読書',
    lab: '実習・実験', presentation: '発表・プレゼン', quiz: '小テスト', exam: '試験対策',
    group: 'グループワーク', other: 'その他'
  };

  const SAMPLE = [
    {id:1,course:"細菌生物学",title:"第2回レポート",type:"report",desc:"細胞周期とチェックポイントについてA4 2枚",start:"2026-04-07",end:"2026-04-28",done:false,remindDays:3},
    {id:2,course:"化学Ⅰ",title:"反応速度の問題集",type:"problem",desc:"教科書p.45〜60の練習問題",start:"2026-04-10",end:"2026-04-24",done:false,remindDays:3},
    {id:3,course:"解剖学",title:"骨格系の暗記",type:"memory",desc:"上肢骨の全名称・起始停止",start:"2026-04-14",end:"2026-05-02",done:false,remindDays:3},
    {id:4,course:"倫理学Ⅰ",title:"ミル読書レポート",type:"report",desc:"功利主義の現代的意義について600字",start:"2026-04-17",end:"2026-05-09",done:false,remindDays:3},
    {id:5,course:"物理学Ⅰ",title:"力学小テスト対策",type:"memory",desc:"公式と例題10問",start:"2026-04-15",end:"2026-04-22",done:false,remindDays:1}
  ];

  let state = loadState();
  let currentView = 'gantt';
  let filterCourse = '';
  let filterStatus = 'open';
  let notifyEnabled = state.notify === true;
  let calCursor = new Date();
  calCursor.setDate(1);
  let calSelectedDate = todayStr();

  const $ = (id) => document.getElementById(id);
  const host = $('viewHost');
  const toastHost = $('toastHost');
  const reminderHost = $('reminderHost');

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { items: SAMPLE.slice(), notify: false, lastNotified: {} };
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.items)) return { items: SAMPLE.slice(), notify: false, lastNotified: {} };
      // Migration: ensure remindDays field exists
      parsed.items.forEach(it => { if (it.remindDays === undefined) it.remindDays = 3; });
      return { items: parsed.items, notify: !!parsed.notify, lastNotified: parsed.lastNotified || {} };
    } catch (e) {
      return { items: SAMPLE.slice(), notify: false, lastNotified: {} };
    }
  }
  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ items: state.items, notify: notifyEnabled, lastNotified: state.lastNotified }));
    } catch (e) {
      toast('保存に失敗しました', 'error');
    }
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function parseDate(s) {
    if (!s) return null;
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  function fmtYmd(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function daysBetween(a, b) {
    const ad = new Date(a.getFullYear(), a.getMonth(), a.getDate());
    const bd = new Date(b.getFullYear(), b.getMonth(), b.getDate());
    return Math.round((bd - ad) / DAY_MS);
  }
  function fmtDate(s) {
    const d = parseDate(s);
    if (!d) return s;
    return `${d.getMonth()+1}/${d.getDate()}`;
  }
  function daysLeft(item) { return daysBetween(parseDate(todayStr()), parseDate(item.end)); }
  function statusOf(item) {
    if (item.done) return 'done';
    const left = daysLeft(item);
    if (left < 0) return 'past';
    if (left <= 3) return 'urgent';
    if (left <= 7) return 'soon';
    return 'ok';
  }

  function filteredItems() {
    return state.items.filter(it => {
      if (filterCourse && it.course !== filterCourse) return false;
      if (filterStatus === 'open' && it.done) return false;
      if (filterStatus === 'done' && !it.done) return false;
      return true;
    });
  }
  function sortedByDeadline(items) {
    return items.slice().sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return a.end.localeCompare(b.end);
    });
  }

  function renderSummary() {
    let urgent = 0, ok = 0, done = 0;
    state.items.forEach(it => {
      if (it.done) { done++; return; }
      const s = statusOf(it);
      if (s === 'urgent' || s === 'past') urgent++;
      else ok++;
    });
    $('sumUrgent').textContent = urgent;
    $('sumOk').textContent = ok;
    $('sumDone').textContent = done;
    const uc = $('cardUrgent');
    if (urgent > 0) uc.classList.add('has-items'); else uc.classList.remove('has-items');
  }

  function refreshCourseOptions() {
    const courses = Array.from(new Set(state.items.map(i => i.course))).sort();
    const sel = $('filterCourse');
    const prev = sel.value;
    sel.innerHTML = '<option value="">すべて</option>' +
      courses.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    sel.value = courses.includes(prev) ? prev : '';
    filterCourse = sel.value;
  }

  function render() {
    renderSummary();
    refreshCourseOptions();
    renderReminder();
    if (currentView === 'gantt') renderGantt();
    else renderCalendar();
  }

  function emptyHtml(msg, emoji, sub) {
    return `<div class="empty"><span class="big-emoji">${emoji}</span>${msg}${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
  }

  // ===== Reminder banner =====
  function renderReminder() {
    if (!notifyEnabled) {
      reminderHost.innerHTML = '';
      return;
    }
    const tasksToAlert = state.items.filter(it => {
      if (it.done) return false;
      const left = daysLeft(it);
      return left >= 0 && left <= 1;
    });
    if (tasksToAlert.length === 0) {
      reminderHost.innerHTML = '';
      return;
    }
    if (sessionStorage.getItem('kadai_reminder_dismissed') === '1') {
      reminderHost.innerHTML = '';
      return;
    }
    const msg = tasksToAlert.length === 1
      ? `⏰ 「${escapeHtml(tasksToAlert[0].title)}」が${daysLeft(tasksToAlert[0]) === 0 ? '今日' : '明日'}締切です`
      : `⏰ 今日〜明日締切の課題が ${tasksToAlert.length} 件あります`;
    reminderHost.innerHTML = `
      <div class="reminder">
        <span class="msg">${msg}</span>
        <button class="close-btn" id="reminderClose" aria-label="閉じる">×</button>
      </div>
    `;
    $('reminderClose').addEventListener('click', () => {
      sessionStorage.setItem('kadai_reminder_dismissed', '1');
      reminderHost.innerHTML = '';
    });
  }

  // ===== Gantt =====
  function renderGantt() {
    const items = sortedByDeadline(filteredItems());
    if (items.length === 0) {
      host.innerHTML = emptyHtml('課題がありません', '🌈', '右下の「＋」から登録しよう');
      return;
    }
    const today = parseDate(todayStr());
    let minDate = today, maxDate = today;
    items.forEach(it => {
      const s = parseDate(it.start);
      const e = parseDate(it.end);
      if (s < minDate) minDate = s;
      if (e > maxDate) maxDate = e;
    });
    minDate = new Date(minDate.getFullYear(), minDate.getMonth(), minDate.getDate() - 2);
    maxDate = new Date(maxDate.getFullYear(), maxDate.getMonth(), maxDate.getDate() + 2);
    const totalDays = Math.max(1, daysBetween(minDate, maxDate));
    const pctOfDate = (dStr) => (daysBetween(minDate, parseDate(dStr)) / totalDays) * 100;
    const todayPct = (daysBetween(minDate, today) / totalDays) * 100;

    const months = [];
    let cursor = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
    const endCursor = new Date(maxDate.getFullYear(), maxDate.getMonth() + 1, 1);
    while (cursor < endCursor) {
      const offset = Math.max(0, daysBetween(minDate, cursor));
      const pct = (offset / totalDays) * 100;
      months.push({ label: `${cursor.getFullYear()}/${cursor.getMonth()+1}`, pct });
      cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
    }

    // Day-level tick labels so users can see the near-future dates at a glance.
    const dayStep = totalDays <= 21 ? 2 : totalDays <= 45 ? 3 : totalDays <= 90 ? 7 : 14;
    const days = [];
    for (let i = 0; i <= totalDays; i += dayStep) {
      const d = new Date(minDate);
      d.setDate(minDate.getDate() + i);
      const pct = (i / totalDays) * 100;
      days.push({ label: `${d.getMonth()+1}/${d.getDate()}`, pct });
    }

    const html = `
      <div class="gantt-wrap">
        <div class="gantt">
          <div class="gantt-header">
            <div class="title-col">📋 課題</div>
            <div class="timeline-col">
              ${months.map(m => `<div class="gantt-month" style="left:${m.pct}%">${m.label}</div>`).join('')}
              ${days.map(d => `<div class="gantt-day-tick" style="left:${d.pct}%">${d.label}</div>`).join('')}
            </div>
            <div class="actions-col">操作</div>
          </div>
          ${items.map((it, i) => ganttRowHtml(it, pctOfDate, i)).join('')}
          <div class="today-line" style="left:calc(var(--title-w) + (100% - var(--title-w) - var(--action-w)) * ${todayPct / 100});"></div>
        </div>
      </div>
    `;
    host.innerHTML = html;
    bindRowActions();

    // Auto-scroll the gantt so today's line is visible without manual sliding.
    requestAnimationFrame(() => {
      const wrap = host.querySelector('.gantt-wrap');
      const line = host.querySelector('.today-line');
      if (!wrap || !line) return;
      const wrapRect = wrap.getBoundingClientRect();
      const lineRect = line.getBoundingClientRect();
      const todayX = lineRect.left - wrapRect.left + wrap.scrollLeft;
      // Position today about 35% from the left edge so more of the near future
      // is visible on screen while keeping a bit of past context.
      const target = Math.max(0, todayX - wrapRect.width * 0.35);
      wrap.scrollLeft = target;
    });
  }

  function ganttRowHtml(it, pctOfDate, idx) {
    const leftPct = pctOfDate(it.start);
    const rightPct = pctOfDate(it.end);
    const widthPct = Math.max(1.8, rightPct - leftPct);
    const s = statusOf(it);
    const barClass = it.done ? 'past' : s;
    const label = `${fmtDate(it.start)} → ${fmtDate(it.end)}`;
    const emoji = TYPE_EMOJI[it.type] || '📎';
    const delay = Math.min(idx * 0.04, 0.5);
    return `
      <div class="gantt-row ${it.done ? 'done' : ''}" data-id="${it.id}">
        <div class="task-label">
          <span class="course-tag">${emoji} ${escapeHtml(it.course)}</span>
          <span class="task-title">${escapeHtml(it.title)}</span>
        </div>
        <div class="timeline-col">
          <div class="bar ${barClass}" style="left:${leftPct}%;width:${widthPct}%;animation-delay:${delay}s;" title="${escapeHtml(label)}">${label}</div>
        </div>
        <div class="row-actions">
          <button class="icon-btn done-btn ${it.done ? 'active' : ''}" data-action="toggle" data-id="${it.id}" title="${it.done ? '未完了に戻す' : '完了にする'}">✓</button>
          <button class="icon-btn del-btn" data-action="del" data-id="${it.id}" title="削除">×</button>
        </div>
      </div>
    `;
  }

  // ===== Calendar =====
  function tasksOnDay(dateStr) {
    return state.items.filter(it => it.end === dateStr)
      .filter(it => {
        if (filterCourse && it.course !== filterCourse) return false;
        if (filterStatus === 'open' && it.done) return false;
        if (filterStatus === 'done' && !it.done) return false;
        return true;
      });
  }

  function renderCalendar() {
    const year = calCursor.getFullYear();
    const month = calCursor.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startOffset = firstDay.getDay();
    const gridStart = new Date(year, month, 1 - startOffset);

    const today = todayStr();
    const cells = [];
    for (let i = 0; i < 42; i++) {
      const d = new Date(gridStart);
      d.setDate(gridStart.getDate() + i);
      const dateStr = fmtYmd(d);
      const tasks = tasksOnDay(dateStr);
      cells.push({
        date: d,
        dateStr,
        isOther: d.getMonth() !== month,
        isToday: dateStr === today,
        isSelected: dateStr === calSelectedDate,
        dow: d.getDay(),
        tasks
      });
    }
    // Trim last row if all other-month
    let totalCells = 42;
    const lastRow = cells.slice(35, 42);
    if (lastRow.every(c => c.isOther)) totalCells = 35;

    const title = `${year}年 ${month + 1}月`;
    const selectedTasks = tasksOnDay(calSelectedDate).sort((a, b) => (a.done ? 1 : 0) - (b.done ? 1 : 0));
    const selDate = parseDate(calSelectedDate);
    const selDow = ['日','月','火','水','木','金','土'][selDate.getDay()];

    const html = `
      <div class="calendar-wrap">
        <div class="calendar-header">
          <button class="cal-nav" id="calPrev" aria-label="前月">‹</button>
          <div class="cal-title">${title}</div>
          <button class="cal-nav" id="calNext" aria-label="翌月">›</button>
          <button class="btn cal-today-btn" id="calToday">今日</button>
        </div>
        <div class="calendar-weekdays">
          <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
        </div>
        <div class="calendar-grid">
          ${cells.slice(0, totalCells).map(c => calCellHtml(c)).join('')}
        </div>
        <div class="cal-detail">
          <div class="cal-detail-header">🗓 ${selDate.getMonth()+1}月${selDate.getDate()}日(${selDow}) 締切の課題</div>
          ${selectedTasks.length === 0
            ? `<div class="cal-detail-empty">この日に締切の課題はありません</div>`
            : selectedTasks.map(it => calTaskHtml(it)).join('')}
        </div>
      </div>
    `;
    host.innerHTML = html;

    $('calPrev').addEventListener('click', () => { calCursor = new Date(year, month - 1, 1); renderCalendar(); });
    $('calNext').addEventListener('click', () => { calCursor = new Date(year, month + 1, 1); renderCalendar(); });
    $('calToday').addEventListener('click', () => {
      const t = new Date();
      calCursor = new Date(t.getFullYear(), t.getMonth(), 1);
      calSelectedDate = todayStr();
      renderCalendar();
    });
    host.querySelectorAll('.cal-cell').forEach(el => {
      el.addEventListener('click', () => {
        calSelectedDate = el.dataset.date;
        renderCalendar();
      });
    });
    bindRowActions();
  }

  function calCellHtml(c) {
    const cls = [
      'cal-cell',
      c.isOther ? 'other-month' : '',
      c.isToday ? 'today' : '',
      c.isSelected ? 'selected' : '',
      c.dow === 0 ? 'sun' : (c.dow === 6 ? 'sat' : '')
    ].filter(Boolean).join(' ');

    const chips = c.tasks.slice(0, 2).map(t => {
      const s = t.done ? 'past' : statusOf(t);
      return `<div class="cal-chip ${s}" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</div>`;
    }).join('');
    const more = c.tasks.length > 2 ? `<div class="cal-chip more">+${c.tasks.length - 2}</div>` : '';
    return `
      <div class="${cls}" data-date="${c.dateStr}">
        <div class="day-num">${c.date.getDate()}</div>
        <div class="cal-chips">${chips}${more}</div>
      </div>
    `;
  }

  function calTaskHtml(it) {
    const s = it.done ? 'done' : statusOf(it);
    const emoji = TYPE_EMOJI[it.type] || '📎';
    const typeLabel = TYPE_LABEL[it.type] || 'その他';
    const left = daysLeft(it);
    let leftText;
    if (it.done) leftText = '✅ 完了';
    else if (left < 0) leftText = `⚠️ ${Math.abs(left)}日超過`;
    else if (left === 0) leftText = '🔥 今日締切';
    else leftText = `残り${left}日`;
    return `
      <div class="cal-task ${s}" data-id="${it.id}">
        <div class="cal-task-body">
          <div class="cal-task-course">🎓 ${escapeHtml(it.course)}</div>
          <div class="cal-task-title">${escapeHtml(it.title)}</div>
          <div class="cal-task-meta">
            <span class="type-badge ${it.type}">${emoji} ${typeLabel}</span>
            &nbsp;${leftText}
          </div>
        </div>
        <div class="cal-task-actions">
          <button class="icon-btn done-btn ${it.done ? 'active' : ''}" data-action="toggle" data-id="${it.id}" title="${it.done ? '未完了に戻す' : '完了にする'}">✓</button>
          <button class="icon-btn del-btn" data-action="del" data-id="${it.id}" title="削除">×</button>
        </div>
      </div>
    `;
  }

  function bindRowActions() {
    host.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.id);
        const action = btn.dataset.action;
        if (action === 'toggle') toggleDone(id, btn);
        else if (action === 'del') deleteItem(id);
      });
    });
  }

  // ===== Actions =====
  function toggleDone(id, btnEl) {
    const it = state.items.find(x => x.id === id);
    if (!it) return;
    it.done = !it.done;
    saveState();
    if (it.done && btnEl) {
      const rect = btnEl.getBoundingClientRect();
      launchConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
    }
    render();
    syncNativeNotifications();
    toast(it.done ? `🎉 「${it.title}」を完了！` : `↩️ 「${it.title}」を未完了に`, it.done ? 'success' : 'warn');
  }
  function deleteItem(id) {
    const it = state.items.find(x => x.id === id);
    if (!it) return;
    if (!confirm(`「${it.title}」を削除しますか？`)) return;
    state.items = state.items.filter(x => x.id !== id);
    saveState();
    render();
    syncNativeNotifications();
    toast('🗑 削除しました', 'warn');
  }
  function addItem(data) {
    const maxId = state.items.reduce((m, x) => Math.max(m, x.id), 0);
    state.items.push({ id: maxId + 1, ...data, done: false });
    saveState();
    render();
    syncNativeNotifications();
    toast('✨ 追加しました', 'success');
  }

  // ===== Confetti =====
  function launchConfetti(x, y) {
    const colors = ['#667eea','#764ba2','#ff5978','#ffa726','#26d67a','#ffcd38','#4fc3f7','#ba68c8'];
    const count = 32;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      const size = 6 + Math.random() * 8;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const shape = Math.random() > 0.5 ? '50%' : '2px';
      el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color};border-radius:${shape};`;
      document.body.appendChild(el);
      const angle = Math.random() * Math.PI * 2;
      const velocity = 120 + Math.random() * 180;
      const dx = Math.cos(angle) * velocity;
      const dy = Math.sin(angle) * velocity - 60;
      const rot = (Math.random() - 0.5) * 720;
      const dur = 900 + Math.random() * 700;
      el.animate([
        { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy + 250}px) rotate(${rot}deg)`, opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(0.22, 0.61, 0.36, 1)', fill: 'forwards' });
      setTimeout(() => el.remove(), dur + 50);
    }
  }

  // ===== Modal =====
  function renderCourseChips() {
    const host = $('chipSuggestions');
    const courses = Array.from(new Set(state.items.map(i => i.course))).sort();
    if (courses.length === 0) { host.innerHTML = ''; return; }
    host.innerHTML = courses.map(c => `<button type="button" class="chip" data-course="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('');
    const input = $('fCourse');
    host.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        input.value = btn.dataset.course;
        updateChipActiveState();
        input.focus();
      });
    });
    updateChipActiveState();
  }
  function updateChipActiveState() {
    const val = $('fCourse').value.trim();
    document.querySelectorAll('#chipSuggestions .chip').forEach(c => {
      c.classList.toggle('active', c.dataset.course === val);
    });
  }

  function openModal() {
    $('addForm').reset();
    $('fStart').value = todayStr();
    $('fRemindDays').value = '3';
    $('formError').textContent = '';
    renderCourseChips();
    $('modalOverlay').classList.add('open');
    $('modalOverlay').setAttribute('aria-hidden', 'false');
    setTimeout(() => $('fCourse').focus(), 100);
  }
  function closeModal() {
    $('modalOverlay').classList.remove('open');
    $('modalOverlay').setAttribute('aria-hidden', 'true');
  }
  $('btnFab').addEventListener('click', openModal);
  $('btnCancel').addEventListener('click', closeModal);
  $('fCourse').addEventListener('input', updateChipActiveState);
  $('modalOverlay').addEventListener('click', (e) => {
    if (e.target === $('modalOverlay')) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  $('addForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const course = $('fCourse').value.trim();
    const title = $('fTitle').value.trim();
    const type = $('fType').value;
    const desc = $('fDesc').value.trim();
    const start = $('fStart').value;
    const end = $('fEnd').value;
    const remindDays = Number($('fRemindDays').value);
    const err = $('formError');
    err.textContent = '';
    if (!course) return (err.textContent = '⚠️ 講義名を入力してください');
    if (!title) return (err.textContent = '⚠️ 課題名を入力してください');
    if (!start) return (err.textContent = '⚠️ 出題日を入力してください');
    if (!end) return (err.textContent = '⚠️ 締切日を入力してください');
    if (end < start) return (err.textContent = '⚠️ 締切日は出題日以降にしてください');
    addItem({ course, title, type, desc, start, end, remindDays });
    closeModal();
  });

  // ===== View toggle =====
  document.querySelectorAll('.view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      render();
    });
  });

  $('filterCourse').addEventListener('change', (e) => { filterCourse = e.target.value; render(); });
  $('filterStatus').addEventListener('change', (e) => { filterStatus = e.target.value; render(); });

  // ===== Theme =====
  const themeKey = 'kadai_tracker_theme';
  function applyTheme(t) {
    if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    $('btnTheme').textContent = t === 'dark' ? '☀️' : '🌙';
  }
  let currentTheme = localStorage.getItem(themeKey) || 'light';
  applyTheme(currentTheme);
  $('btnTheme').addEventListener('click', () => {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    localStorage.setItem(themeKey, currentTheme);
    applyTheme(currentTheme);
  });

  // ===== Notifications =====
  const hasNotifAPI = typeof Notification !== 'undefined';

  function postToNative(name, body) {
    try {
      if (typeof webkit !== 'undefined' && webkit && webkit.messageHandlers && webkit.messageHandlers[name]) {
        webkit.messageHandlers[name].postMessage(body);
        return true;
      }
    } catch (e) {}
    return false;
  }
  const hasNativeBridge = (() => {
    try {
      return typeof webkit !== 'undefined'
        && webkit
        && webkit.messageHandlers
        && typeof webkit.messageHandlers['schedule-local'] !== 'undefined';
    } catch (e) { return false; }
  })();

  function buildNotificationsPayload() {
    const now = Date.now();
    const out = [];
    state.items.forEach(it => {
      if (it.done) return;
      const rd = Number(it.remindDays ?? 3);
      if (rd < 0) return;
      const end = parseDate(it.end);
      if (!end) return;
      const offsets = [];
      if (rd >= 7) offsets.push(7);
      if (rd >= 3) offsets.push(3);
      if (rd >= 1) offsets.push(1);
      if (rd >= 0) offsets.push(0);
      offsets.forEach(off => {
        const when = new Date(end);
        when.setDate(when.getDate() - off);
        when.setHours(9, 0, 0, 0);
        if (when.getTime() <= now) return;
        out.push({
          id: `${it.id}-${off}`,
          title: off === 0 ? `🔥 今日締切: ${it.title}` : `⏰ あと${off}日: ${it.title}`,
          body: `${it.course} — ${TYPE_LABEL[it.type] || ''}`,
          when: when.toISOString()
        });
      });
    });
    return out;
  }

  function syncNativeNotifications() {
    if (!hasNativeBridge) return;
    const notifications = notifyEnabled ? buildNotificationsPayload() : [];
    postToNative('schedule-local', JSON.stringify({ notifications }));
  }

  function updateNotifyBtn() {
    const btn = $('btnNotify');
    btn.textContent = notifyEnabled ? '🔔' : '🔕';
  }

  $('btnNotify').addEventListener('click', async () => {
    // If native API available and permission not yet determined, request it before toggling ON.
    if (!notifyEnabled && hasNotifAPI && Notification.permission === 'default') {
      try { await Notification.requestPermission(); } catch (e) {}
    }
    notifyEnabled = !notifyEnabled;
    saveState();
    updateNotifyBtn();
    render();
    if (notifyEnabled) {
      toast('🔔 リマインダーON', 'success');
      runScheduledNotifications();
      syncNativeNotifications();
    } else {
      toast('🔕 リマインダーOFF', 'warn');
      syncNativeNotifications();
    }
  });

  function runScheduledNotifications() {
    if (!notifyEnabled || typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    const today = todayStr();
    const triggerList = [];
    state.items.forEach(it => {
      if (it.done || it.remindDays === -1) return;
      const left = daysLeft(it);
      if (left < 0) return;
      const rd = Number(it.remindDays ?? 3);
      // Which offsets to notify on based on remindDays setting
      const offsets = [];
      if (rd >= 7 && left === 7) offsets.push(7);
      if (rd >= 3 && left === 3) offsets.push(3);
      if (rd >= 1 && left === 1) offsets.push(1);
      if (rd >= 0 && left === 0) offsets.push(0);
      offsets.forEach(off => {
        const key = `${it.id}_${today}_${off}`;
        if (state.lastNotified[key]) return;
        state.lastNotified[key] = true;
        triggerList.push({ item: it, offset: off });
      });
    });
    // Cleanup old lastNotified entries (older than 30 days)
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
    Object.keys(state.lastNotified).forEach(k => {
      const parts = k.split('_');
      if (parts.length >= 2) {
        const d = parseDate(parts[1]);
        if (d && d < cutoff) delete state.lastNotified[k];
      }
    });
    saveState();
    triggerList.forEach(({ item, offset }) => {
      const title = offset === 0 ? `🔥 今日締切: ${item.title}` : `⏰ あと${offset}日: ${item.title}`;
      try {
        new Notification(title, { body: `${item.course} — ${TYPE_LABEL[item.type] || ''}` });
      } catch (e) { /* noop */ }
    });
  }

  // ===== Toast =====
  function toast(msg, kind) {
    const el = document.createElement('div');
    el.className = 'toast' + (kind ? ' ' + kind : '');
    el.textContent = msg;
    toastHost.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 300);
    }, 2800);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function handleUrlAction() {
    try {
      const url = new URL(location.href);
      if (url.searchParams.get('action') === 'add') {
        openModal();
        url.searchParams.delete('action');
        history.replaceState(null, '', url.pathname + (url.search || '') + url.hash);
      }
    } catch (e) {}
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  // Re-check notifications when app becomes visible (catches next-day transitions)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      render();
      if (notifyEnabled) runScheduledNotifications();
    }
  });

  updateNotifyBtn();
  render();
  handleUrlAction();
  setTimeout(() => {
    if (notifyEnabled) {
      runScheduledNotifications();
      syncNativeNotifications();
    }
  }, 600);
})();
</script>
</body>
</html>
